      // Ultra-Safe LucideIcon for React compat mode
      const LucideIcon = React.memo(({ name, className = "" }) => {
        const iconRef = React.useRef(null);

        useEffect(() => {
          if (window.lucide && iconRef.current) {
            // Create a dedicated shell that React doesn't touch
            // We render INTO this shell to avoid removeChild errors
            const shell = iconRef.current;
            shell.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
            try {
              window.lucide.createIcons({ root: shell });
            } catch (e) {
              console.warn("Lucide shell error:", e);
            }
          }
        }, [name, className]);

        // We use dangerouslySetInnerHTML to tell React "don't manage children"
        return (
          <span
            ref={iconRef}
            className="inline-flex items-center justify-center shrink-0"
            dangerouslySetInnerHTML={{ __html: "" }}
          ></span>
        );
      });

      // Error Boundary Component
      class ErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { hasError: false, error: null };
        }
        static getDerivedStateFromError(error) {
          return { hasError: true, error };
        }
        componentDidCatch(error, errorInfo) {
          console.error("React Crash:", error, errorInfo);
        }
        render() {
          if (this.state.hasError) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-10 text-center">
                <div className="max-w-md">
                  <i className="w-20 h-20 text-red-500 mx-auto mb-8 block">

                    <code className="text-red-400 text-xs break-all">

                  </div>
                  <button
                    onClick={() => {
                      localStorage.clear();

                    }}
                    className="bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase"

        const [showResult, setShowResult] = useState(false);
        const [score, setScore] = useState(0);
        const [streak, setStreak] = useState(0);
        const [showStreakAnim, setShowStreakAnim] = useState(false);
        const [finished, setFinished] = useState(false);

        useEffect(() => {
          if (!lesson || !lesson.questionPool) return;

          // Fisher-Yates Shuffle
          const shuffle = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [arr[j], arr[i]] = [arr[i], arr[j]];
            }
            return arr;
          };

          const pool = shuffle(lesson.questionPool);
          const limit = Math.min(pool.length, 20);
          const selectedQuestions = pool.slice(0, limit).map((q) => {
            // Also randomize options for each question
            const originalOptions = q.options.map((text, index) => ({
              text,
              isCorrect: index === q.correct,
            }));
            const shuffledOpts = shuffle(originalOptions);
            return {
              ...q,
              options: shuffledOpts.map((o) => o.text),
              correct: shuffledOpts.findIndex((o) => o.isCorrect),
            };
          });

          setQuestions(selectedQuestions);
          setCurrent(0);
          setSelected(null);
          setShowResult(false);
          setScore(0);
          setStreak(0);
          setFinished(false);
        }, [lesson?.id]);

        const handleAnswer = (idx) => {
          if (showResult) return;
          setSelected(idx);
          setShowResult(true);

          const isCorrect = idx === questions[current].correct;
          if (isCorrect) {

            const nextStreak = streak + 1;
            setStreak(nextStreak);
            playSound(SOUNDS.CORRECT);

            if (nextStreak >= 5) {
              setShowStreakAnim(true);
              setTimeout(() => setShowStreakAnim(false), 1500);
            }
          } else {
            setStreak(0);
            playSound(SOUNDS.WRONG);
          }
        };

        const next = () => {
          if (current < questions.length - 1) {
            setCurrent((c) => c + 1);

            setShowResult(false);

            setFinished(true);
            onComplete(score, questions.length);

                onClick={() => {

                  const shuffle = (array) => {
                    const arr = [...array];
                    for (let i = arr.length - 1; i > 0; i--) {
                      const j = Math.floor(Math.random() * (i + 1));
                      [arr[i], arr[j]] = [arr[j], arr[i]];
                    }
                    return arr;
                  };
                  const pool = shuffle(lesson.questionPool);
                  const limit = Math.min(pool.length, 20);

            const editor = window.ace.edit(editorRef.current);

            editor.setTheme("ace/theme/textmate");
            editor.setShowPrintMargin(false);
            editor.session.setMode(
              language === "python" ? "ace/mode/python" : "ace/mode/c_cpp",
            );
            editor.setValue(code || "", -1);
            editor.setFontSize(14);

            editor.on("change", () => {

          }

          return () => {
            if (aceInstance.current) {
              aceInstance.current.destroy();
              aceInstance.current = null;

        const [selectedProb, setSelectedProb] = useState(null);
        const [quizAnswers, setQuizAnswers] = useState({});
        const [quizSubmitted, setQuizSubmitted] = useState(false);
        const [timeLeft, setTimeLeft] = useState(contest.durationMinutes * 60);

        useEffect(() => {
          if (!isDbReady || !db) return;
          const fetchProblems = async () => {
            const fm = window.FirebaseModular;
            if (contest.type === "coding") {
              const probDocs = await Promise.all(
                contest.problemIds.map((id) =>
                  fm.getDoc(fm.doc(db, "coding_problems", id)),
                ),
              );
              setProblems(probDocs.map((d) => ({ id: d.id, ...d.data() })));
            }
          };
          fetchProblems();
        }, [contest.problemIds, contest.type, isDbReady]);

        // Timer logic for quiz
        useEffect(() => {
          if (
            contest.type === "general" &&
            view === "quiz" &&
            !quizSubmitted &&
            timeLeft > 0
          ) {
            const timer = setInterval(
              () => setTimeLeft((prev) => prev - 1),
              1000,
            );
            if (timeLeft <= 0) handleQuizSubmit();
            return () => clearInterval(timer);
          }
        }, [view, quizSubmitted, timeLeft]);

        useEffect(() => {
          if (!isDbReady || !db) return;
          const fm = window.FirebaseModular;
          const q = fm.query(
            fm.collection(db, "contest_submissions"),
            fm.where("contestId", "==", contest.id),
          );
          const unsubscribe = fm.onSnapshot(q, (snap) => {
            const subs = snap.docs.map((doc) => doc.data());
            setSubmissions(subs);

            // Logic leaderboard
            const board = {};
            subs.forEach((s) => {
              const uid = s.userId;
              if (!board[uid])
                board[uid] = {
                  name: s.userName,
                  class: s.userClass,
                  avatar: s.avatar || "",
                  correct: 0,
                  score: 0,
                  time: 0,
                  problems: {},
                };

              if (contest.type === "coding") {
                if (s.isCorrect && !board[uid].problems[s.problemId]) {
                  board[uid].correct += 1;
                  board[uid].problems[s.problemId] = true;
                  const submitTime = new Date(s.submittedAt).getTime();
                  if (submitTime > board[uid].time)
                    board[uid].time = submitTime;
                }
              } else {
                // Quiz scoring
                board[uid].score = s.score;
                board[uid].time = new Date(s.submittedAt).getTime();
              }
            });

            const sorted = Object.values(board).sort((a, b) => {
              if (contest.type === "coding") {
                return b.correct - a.correct || a.time - b.time;
              } else {
                return b.score - a.score || a.time - b.time;
              }
            });
            setLeaderboard(sorted);
          });
          return unsubscribe;
        }, [contest.id, contest.type]);

        const handleProblemSubmit = async (isCorrect) => {
          try {
            const fm = window.FirebaseModular;
            const myId = localStorage.getItem("informatics_local_id");
            await fm.addDoc(fm.collection(db, "contest_submissions"), {
              userId: myId,
              userName: userStats?.userName || userUsername || "Anonymous",
              userClass: userStats?.userClass || "N/A",
              avatar: userStats?.avatar || "",
              contestId: contest.id,
              problemId: selectedProb.id,
              isCorrect: isCorrect,
              submittedAt: new Date().toISOString(),
            });

            if (isCorrect) {
              const correctCount =
                submissions.filter((s) => s.userId === myId && s.isCorrect)
                  .length + 1;
              const isAlreadyRewarded = (
                userStats.completedContests || []
              ).includes(contest.id);

              if (!isAlreadyRewarded && correctCount === problems.length) {
                alert(
                  `Chúc mừng! Bạn đã hoàn thành kỳ thi và nhận được ${contest.rewardStars} Sao!`,
                );
                await fm.setDoc(
                  fm.doc(db, "users", myId),
                  {
                    stars: fm.increment(contest.rewardStars),
                    completedContests: fm.arrayUnion(contest.id),
                    updatedAt: fm.serverTimestamp(),
                  },
                  { merge: true },
                );
                setUserStats((prev) => ({
                  ...prev,
                  stars: (prev.stars || 0) + contest.rewardStars,
                  completedContests: [
                    ...(prev.completedContests || []),
                    contest.id,
                  ],
                }));
              }
            }
          } catch (err) {
            alert("Lỗi nộp bài: " + (err.message || "Không xác định"));
            console.error(err);
          }
        };

        const handleQuizSubmit = async () => {
          if (quizSubmitted) return;
          setQuizSubmitted(true);

          let score = 0;
          contest.questions.forEach((q, idx) => {
            if (q.type === "mcq") {
              if (quizAnswers[idx] === q.correctOption) score += 1;
            } else if (q.type === "tf") {
              // T/F scoring: each subitem correct is 0.25 pts (if 4 items = 1 pt total)
              let subScore = 0;
              q.subQuestions.forEach((sq, i) => {
                if (quizAnswers[`${idx}_${i}`] === sq.correct) subScore += 0.25;
              });
              score += subScore;
            } else if (q.type === "short") {
              // case-insensitive exact matching
              const ans = (quizAnswers[idx] || "")
                .toString()
                .trim()
                .toLowerCase();
              const correctAns = (q.shortAnswer || "")
                .toString()
                .trim()
                .toLowerCase();
              if (ans === correctAns && ans !== "") {
                score += 1;
              }
            }
          });

          try {
            const fm = window.FirebaseModular;
            const myId = localStorage.getItem("informatics_local_id");
            await fm.addDoc(fm.collection(db, "contest_submissions"), {
              userId: myId,
              userName: userStats?.userName || userUsername || "Anonymous",
              userClass: userStats?.userClass || "N/A",
              avatar: userStats?.avatar || "",
              contestId: contest.id,
              score: score,
              submittedAt: new Date().toISOString(),
            });

            const isAlreadyRewarded = (
              userStats.completedContests || []
            ).includes(contest.id);
            if (!isAlreadyRewarded && score >= contest.questions.length * 0.8) {
              // 80% to get reward
              alert(
                `Chúc mừng! Bạn đạt ${score}/${contest.questions.length} điểm và nhận được ${contest.rewardStars} Sao!`,
              );
              await fm.setDoc(
                fm.doc(db, "users", myId),
                {
                  stars: fm.increment(contest.rewardStars),
                  completedContests: fm.arrayUnion(contest.id),
                  updatedAt: fm.serverTimestamp(),
                },
                { merge: true },
              );
              setUserStats((prev) => ({
                ...prev,
                stars: (prev.stars || 0) + contest.rewardStars,
                completedContests: [
                  ...(prev.completedContests || []),
                  contest.id,
                ],
              }));
            } else {
              alert(
                `Kết quả: ${score}/${contest.questions.length} điểm. Hãy cố gắng hơn ở các kỳ thi sau!`,
              );
            }
            setView("leaderboard");
          } catch (err) {
            alert("Lỗi nộp bài: " + (err.message || "Không xác định"));
            console.error(err);
          }
        };

        const QuizView = () => {
          const mins = Math.floor(timeLeft / 60);
          const secs = timeLeft % 60;

          return (
            <div className="space-y-8 pb-32">
              <div className="sticky top-0 z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md p-4 rounded-3xl border border-slate-100 dark:border-slate-800 flex justify-between items-center shadow-xl">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black italic">
                    !
                  </div>
                  <div>
                    <h4 className="text-xs font-black uppercase tracking-widest text-slate-400">
                      Thời gian làm bài
                    </h4>
                    <p
                      className={`text-xl font-black font-mono ${timeLeft < 300 ? "text-red-500 animate-pulse" : "dark:text-white"}`}
                    >
                      {mins.toString().padStart(2, "0")}:
                      {secs.toString().padStart(2, "0")}
                    </p>
                  </div>
                </div>
                <button
                  onClick={handleQuizSubmit}
                  className="px-8 py-3 bg-emerald-500 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-emerald-500/20"
                >
                  Nộp bài thi
                </button>
              </div>

              <div className="space-y-12">
                {contest.questions.map((q, idx) => (
                  <div
                    key={idx}
                    className="bg-white dark:bg-slate-900 p-8 rounded-[40px] border border-slate-100 dark:border-slate-800 shadow-xl relative overflow-hidden group"
                  >
                    <div className="absolute top-0 left-0 w-2 h-full bg-blue-600 opacity-20 group-hover:opacity-100 transition-opacity"></div>
                    <div className="flex items-center gap-4 mb-6">
                      <span className="w-10 h-10 bg-slate-50 dark:bg-slate-800 rounded-xl flex items-center justify-center text-xs font-black dark:text-white">
                        #{idx + 1}
                      </span>
                      <span
                        className={`px-3 py-1 rounded-full text-[8px] font-black uppercase text-white ${q.type === "mcq" ? "bg-blue-600" : q.type === "tf" ? "bg-orange-600" : "bg-emerald-600"}`}
                      >
                        {q.type === "mcq"
                          ? "Chọn đáp án đúng"
                          : q.type === "tf"
                            ? "Đúng / Sai"
                            : "Điền câu trả lời"}
                      </span>
                    </div>
                    <p className="text-xl font-bold dark:text-white mb-8 leading-relaxed whitespace-pre-wrap">
                      {q.question}
                    </p>

                    {q.type === "mcq" ? (
                      <div className="grid gap-3">
                        {q.options.map((opt, i) => (
                          <button
                            key={i}
                            onClick={() =>
                              setQuizAnswers({ ...quizAnswers, [idx]: i })
                            }
                            className={`group w-full p-6 rounded-3xl border-2 text-left transition-all flex items-center gap-6 ${quizAnswers[idx] === i ? "border-blue-600 bg-blue-50 dark:bg-blue-900/20" : "border-slate-50 dark:border-slate-800 hover:border-slate-200"}`}
                          >
                            <span
                              className={`w-10 h-10 rounded-xl flex items-center justify-center font-black transition-all ${quizAnswers[idx] === i ? "bg-blue-600 text-white" : "bg-slate-100 dark:bg-slate-800 text-slate-400 group-hover:bg-slate-200"}`}
                            >
                              {String.fromCharCode(65 + i)}
                            </span>
                            <span
                              className={`text-lg font-bold ${quizAnswers[idx] === i ? "text-blue-600" : "text-slate-600 dark:text-slate-300"}`}
                            >
                              {opt}
                            </span>
                          </button>
                        ))}
                      </div>
                    ) : q.type === "tf" ? (
                      <div className="grid gap-4">
                        {q.subQuestions.map((sq, i) => (
                          <div
                            key={i}
                            className="flex flex-col md:flex-row md:items-center gap-4 p-6 bg-slate-50 dark:bg-slate-800/50 rounded-3xl border border-slate-100 dark:border-slate-800"
                          >
                            <span className="text-sm font-black text-slate-400 uppercase w-8 shrink-0">
                              {sq.text}
                            </span>
                            <p className="flex-1 text-sm font-bold dark:text-slate-200">
                              {sq.content || "Nội dung ý hỏi..."}
                            </p>
                            <div className="flex gap-2 shrink-0">
                              <button
                                onClick={() =>
                                  setQuizAnswers({
                                    ...quizAnswers,
                                    [`${idx}_${i}`]: true,
                                  })
                                }
                                className={`px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${quizAnswers[`${idx}_${i}`] === true ? "bg-green-500 text-white shadow-lg" : "bg-white dark:bg-slate-700 text-slate-400"}`}
                              >
                                Đúng
                              </button>
                              <button
                                onClick={() =>
                                  setQuizAnswers({
                                    ...quizAnswers,
                                    [`${idx}_${i}`]: false,
                                  })
                                }
                                className={`px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${quizAnswers[`${idx}_${i}`] === false ? "bg-red-500 text-white shadow-lg" : "bg-white dark:bg-slate-700 text-slate-400"}`}
                              >
                                Sai
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="mt-4">
                        <input
                          type="text"
                          value={quizAnswers[idx] || ""}
                          onChange={(e) =>
                            setQuizAnswers({
                              ...quizAnswers,
                              [idx]: e.target.value,
                            })
                          }
                          placeholder="Nhập câu trả lời của bạn..."
                          className="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 p-6 rounded-3xl font-bold dark:text-white text-lg focus:border-emerald-500 outline-none"
                        />
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        };

        if (selectedProb) {
          return (
            <div className="animate-in fade-in zoom-in duration-500">
              <button
                onClick={() => setSelectedProb(null)}
                className="flex items-center gap-2 text-xs font-black text-slate-400 mb-6 uppercase tracking-widest hover:text-blue-500"
              >
                <LucideIcon name="arrow-left" className="w-4 h-4" /> Quay lại
                danh sách bài tập
              </button>
              <CodingInterface
                problem={selectedProb}
                onContestSubmit={handleProblemSubmit}
                isContest={true}
              />
            </div>
          );
        }

        if (view === "quiz" && contest.type === "general") {
          return <QuizView />;
        }

        const isCompleted = (userStats.completedContests || []).includes(
          contest.id,
        );

        return (
          <div className="space-y-8 animate-in fade-in duration-500">
            <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 bg-purple-600 p-8 md:p-12 rounded-[40px] text-white shadow-2xl relative overflow-hidden">
              <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-32 -mt-32 blur-3xl"></div>
              <div className="relative space-y-4">
                <button
                  onClick={onBack}
                  className="flex items-center gap-2 text-[10px] font-black text-white/60 uppercase tracking-widest hover:text-white mb-2"
                >
                  <LucideIcon name="arrow-left" className="w-4 h-4" /> Quay lại
                  dashboard
                </button>
                <div className="flex items-center gap-3">
                  {contest.type === "general" ? (
                    <LucideIcon name="file-text" className="w-8 h-8" />
                  ) : (
                    <LucideIcon name="code" className="w-8 h-8" />
                  )}
                  <h2 className="text-4xl font-black uppercase italic tracking-tighter">
                    {contest.title}
                  </h2>
                </div>
                <p className="text-sm font-medium opacity-80">
                  {contest.type === "coding"
                    ? "🔥 Giải đúng toàn bộ bài tập để nhận thưởng!"
                    : `🔥 Hoàn thành bài thi trắc nghiệm trong ${contest.durationMinutes} phút!`}
                </p>
              </div>
              <div className="relative flex gap-4">
                {contest.type === "coding" ? (
                  <button
                    onClick={() => setView("list")}
                    className={`px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest transition-all ${view === "list" ? "bg-white text-purple-600 shadow-xl" : "bg-purple-700/50 hover:bg-purple-700"}`}
                  >
                    Danh sách
                  </button>
                ) : (
                  <button
                    onClick={() => !isCompleted && setView("quiz")}
                    disabled={isCompleted}
                    className={`px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest transition-all ${view === "quiz" ? "bg-white text-purple-600 shadow-xl" : "bg-purple-700 text-white shadow-xl opacity-100 disabled:opacity-50"}`}
                  >
                    {isCompleted ? "Đã hoàn thành" : "Bắt đầu làm bài"}
                  </button>
                )}
                <button
                  onClick={() => setView("leaderboard")}
                  className={`px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest transition-all ${view === "leaderboard" ? "bg-white text-purple-600 shadow-xl" : "bg-purple-700/50 hover:bg-purple-700"}`}
                >
                  Bảng xếp hạng
                </button>
              </div>
            </header>

            {view === "list" && contest.type === "coding" && (
              <div className="grid gap-4">
                {problems.map((p, idx) => (
                  <button
                    key={p.id}
                    onClick={() => setSelectedProb(p)}
                    className="group flex items-center justify-between p-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-xl hover:scale-[1.01] hover:border-purple-500 transition-all text-left"
                  >
                    <div className="flex items-center gap-6">
                      <div className="w-14 h-14 bg-slate-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center text-slate-400 group-hover:text-purple-600 group-hover:bg-purple-50 transition-colors">
                        <span className="text-2xl font-black italic">
                          {idx + 1}
                        </span>
                      </div>
                      <div>
                        <h4 className="text-xl font-black uppercase italic dark:text-white">
                          {p.title}
                        </h4>
                        <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">
                          {p.difficulty === "easy"
                            ? "Biết"
                            : p.difficulty === "medium"
                              ? "Hiểu"
                              : "Vận dụng"}{" "}
                          •{" "}
                          {p.difficulty === "easy"
                            ? "10"
                            : p.difficulty === "medium"
                              ? "20"
                              : "30"}{" "}
                          Points
                        </p>
                      </div>
                    </div>
                    <LucideIcon
                      name="arrow-right"
                      className="w-6 h-6 text-slate-200 group-hover:text-purple-500 group-hover:translate-x-2 transition-all"
                    />
                  </button>
                ))}
              </div>
            )}

            {view === "leaderboard" && (
              <div className="bg-white dark:bg-slate-900 rounded-[40px] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800">
                <div className="p-8 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                  <h4 className="text-xl font-black italic uppercase tracking-tighter dark:text-white">
                    TOP THÍ SINH DẪN ĐẦU
                  </h4>
                  <div className="flex items-center gap-2 bg-slate-50 dark:bg-slate-800 px-4 py-2 rounded-xl">
                    <LucideIcon
                      name="users"
                      className="w-4 h-4 text-slate-400"
                    />
                    <span className="text-[10px] font-black text-slate-500 uppercase">
                      {leaderboard.length} Phản hồi
                    </span>
                  </div>
                </div>
                <table className="w-full text-left">
                  <thead className="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-700">
                    <tr>
                      <th className="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        Hạng
                      </th>
                      <th className="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        Thí sinh
                      </th>
                      <th className="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        Lớp
                      </th>
                      <th className="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">
                        {contest.type === "coding" ? "Đúng" : "Điểm số"}
                      </th>
                      <th className="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">
                        Hoàn thành
                      </th>
                    </tr>
                  </thead>
                  <tbody>
                    {leaderboard.map((u, i) => (
                      <tr
                        key={i}
                        className="border-b border-slate-50 dark:border-slate-800/50 last:border-0 hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors"
                      >
                        <td className="p-6">
                          <div
                            className={`w-8 h-8 rounded-lg flex items-center justify-center font-black italic text-sm ${i === 0 ? "bg-yellow-400 text-white" : i === 1 ? "bg-slate-300 text-white" : i === 2 ? "bg-orange-400 text-white" : "text-slate-400"}`}
                          >
                            {i + 1}
                          </div>
                        </td>
                        <td className="p-6">
                          <div className="flex items-center gap-3">
                            {u.avatar ? (
                              <img
                                src={u.avatar}
                                alt="Avatar"
                                className="w-8 h-8 rounded-lg object-cover"
                                referrerPolicy="no-referrer"
                              />
                            ) : (
                              <div className="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-400">
                                <LucideIcon name="user" className="w-4 h-4" />
                              </div>
                            )}
                            <span className="font-black uppercase text-sm dark:text-white tracking-tight">
                              {u.name}
                            </span>
                          </div>
                        </td>
                        <td className="p-6 text-xs font-bold text-slate-400">
                          {u.class}
                        </td>
                        <td className="p-6 text-center">
                          {contest.type === "coding" ? (
                            <span className="px-4 py-1.5 bg-green-500/10 text-green-500 rounded-full text-xs font-black">
                              {u.correct}/{contest.problemIds.length}
                            </span>
                          ) : (
                            <span className="px-4 py-1.5 bg-blue-500/10 text-blue-500 rounded-full text-sm font-black italic">
                              {(u.score || 0).toFixed(2)}
                            </span>
                          )}
                        </td>
                        <td className="p-6 text-right font-mono text-xs text-slate-500">
                          {u.time
                            ? new Date(u.time).toLocaleTimeString()
                            : "--:--"}
                        </td>
                      </tr>
                    ))}
                    {leaderboard.length === 0 && (
                      <tr>
                        <td
                          colSpan="5"
                          className="p-20 text-center text-slate-400 font-bold uppercase tracking-widest"
                        >
                          Chưa có kết quả nào
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        );
      };

      const CodingInterface = ({ problem, isContest, onContestSubmit }) => {
        const [code, setCode] = useState("");
        const [language, setLanguage] = useState("python");
        const [results, setResults] = useState(null);
        const [isGrading, setIsGrading] = useState(false);
        const [error, setError] = useState(null);

        const handleSubmit = async () => {
          playSound(SOUNDS.CLICK);
          setIsGrading(true);
          setResults(null);
          setError(null);

          try {
            const testCases =
              problem.testCases && problem.testCases.length > 0
                ? problem.testCases
                : [
                    {
                      input: problem.sampleInput || "5 10",
                      output: problem.sampleOutput || "15",
                    },
                  ]; // fallback

            const response = await fetch("/api/execute", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                code,
                language,
                testCases,
              }),
            });

            const data = await response.json();

            if (data.error) {
              setError(data.error || "Có lỗi xảy ra khi chấm bài.");
              setIsGrading(false);
              return;
            }

            const finalResults = data.results.map((r, idx) => ({
              id: idx + 1,
              status: r.status,
              time: r.time || "0.000",
              memory: (Math.random() * 5 + 1).toFixed(2), // Memory is still hard to track accurately here
              score: r.status === "AC" ? "1/1" : "0/1",
              actual: r.actual,
              expected: r.expected,
              stderr: r.stderr,
            }));

            setResults(finalResults);
            setIsGrading(false);

            const allCorrect = finalResults.every((r) => r.status === "AC");
            if (isContest && onContestSubmit) {
              onContestSubmit(allCorrect);
            }
          } catch (err) {
            console.error(err);
            setError("Không thể kết nối đến máy chủ chấm bài.");
            setIsGrading(false);
          }
        };

        const renderMarkdown = (text) => {
          if (!text) return null;
          return text.split("\n").map((line, i) => {
            if (line.startsWith("### ")) {
              return (
                <h5
                  key={i}
                  className="text-sm font-black mt-6 mb-3 text-blue-600 uppercase tracking-widest"
                >
                  {line.replace("### ", "")}
                </h5>
              );
            }
            if (line.startsWith("- ")) {
              return (
                <div key={i} className="flex gap-3 mb-2 items-start">
                  <div className="w-1.5 h-1.5 bg-blue-400 rounded-full mt-2 shrink-0"></div>
                  <span className="text-slate-600 dark:text-slate-400">
                    {line.replace("- ", "")}
                  </span>
                </div>
              );
            }
            if (line.trim() === "") return <div key={i} className="h-2"></div>;
            return (
              <p
                key={i}
                className="text-slate-600 dark:text-slate-400 mb-2 leading-relaxed"
              >
                {line}
              </p>
            );
          });
        };

        return (
          <div className="flex flex-col lg:flex-row gap-8 bg-white dark:bg-slate-900 rounded-[40px] shadow-2xl border border-slate-100 dark:border-slate-800 overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            {/* Left: Problem */}
            <div className="lg:w-1/2 p-8 md:p-12 border-b lg:border-b-0 lg:border-r border-slate-100 dark:border-slate-800 overflow-y-auto max-h-[600px] flex flex-col">
              <div className="flex items-center gap-2 text-[10px] font-black text-blue-500 uppercase tracking-widest mb-6">
                <LucideIcon name="file-text" className="w-4 h-4" />
                Đề bài thực hành
              </div>
              <h4 className="text-3xl font-black mb-6 dark:text-white leading-tight italic uppercase tracking-tighter">
                {problem.title}
              </h4>
              <div className="flex-1">
                {problem.descriptionType === "image" ? (
                  <div className="rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 mx-auto max-w-full">
                    <img src={problem.descriptionImage || problem.description} alt={problem.title} className="w-full h-auto" />
                  </div>
                ) : (
                  renderMarkdown(problem.description)
                )}
              </div>

              <div className="mt-8 p-6 bg-slate-50 dark:bg-slate-800/30 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700">
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">
                  Gợi ý thuật toán
                </p>
                <p className="text-xs text-slate-500 italic">
                  Sử dụng ngôn ngữ Python hoặc C++ để trình bày lời giải của
                  bạn.
                </p>
              </div>
            </div>

            {/* Right: Code Editor */}
            <div className="lg:w-1/2 p-4 md:p-8 flex flex-col bg-slate-50 dark:bg-slate-800/50">
              <div className="mb-4 flex flex-col gap-2">
                <h2 className="text-2xl font-normal text-slate-800 dark:text-white">
                  Nộp bài{" "}
                  <span className="text-blue-600 uppercase uppercase">
                    {problem.title}
                  </span>
                </h2>
                <div className="border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-md p-0 flex flex-col shadow-sm">
                  <div className="p-3 border-b border-slate-200 dark:border-slate-700 bg-[#f8f9fa] dark:bg-slate-800 text-sm text-slate-700 dark:text-slate-300 flex items-center justify-between">
                    <div className="flex items-center gap-2 text-xs italic">
                      Dán bài làm của bạn ở đây hoặc nhập từ file:
                      <input
                        type="file"
                        accept=".py,.cpp,.c"
                        className="text-xs ml-2 cursor-pointer file:cursor-pointer file:border-0 file:bg-slate-200 file:text-slate-700 file:py-1 file:px-2 file:rounded file:text-xs hover:file:bg-slate-300 transition-colors"
                        onChange={(e) => {
                          const file = e.target.files[0];
                          if (!file) return;
                          const reader = new FileReader();
                          reader.onload = (e) => setCode(e.target.result);
                          reader.readAsText(file);
                        }}
                      />
                    </div>
                    <LucideIcon
                      name="maximize"
                      className="w-4 h-4 cursor-pointer hover:text-blue-600"
                      onClick={() => {
                        const el = document.documentElement;
                        if (el.requestFullscreen) {
                          el.requestFullscreen();
                        }
                      }}
                    />
                  </div>

                  <AceCodeEditor
                    code={code}
                    setCode={setCode}
                    language={language}
                  />

                  <div className="p-3 border-t border-slate-200 dark:border-slate-700 bg-[#f8f9fa] dark:bg-slate-800 flex justify-between items-center">
                    <select
                      value={language}
                      onChange={(e) => setLanguage(e.target.value)}
                      className="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded px-3 py-1.5 text-xs font-semibold text-slate-800 dark:text-slate-200 outline-none w-1/2 hover:border-slate-400 cursor-pointer"
                    >
                      <option value="python">Python 3 (3.10.0)</option>
                      <option value="cpp">C++17 (g++ 10.2.0)</option>
                    </select>
                    <button
                      onClick={handleSubmit}
                      disabled={!code.trim() || isGrading}
                      className="bg-[#2470ab] text-white px-6 py-2 rounded text-sm font-semibold hover:bg-blue-700 disabled:bg-slate-400 disabled:cursor-not-allowed transition-colors"
                    >
                      Nộp bài!
                    </button>
                  </div>
                </div>
              </div>

              {error && (
                <div className="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg text-red-600 font-bold text-sm">
                  <div className="flex items-center gap-2 mb-2">
                    <LucideIcon name="alert-circle" className="w-4 h-4" />
                    <span>Lỗi xử lý</span>
                  </div>
                  <pre className="whitespace-pre-wrap font-mono text-[11px] bg-red-100 p-3 rounded">
                    {error}
                  </pre>
                </div>
              )}

              {isGrading && (
                <div className="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-600 font-bold text-sm animate-pulse">
                  <div className="flex items-center gap-2">
                    <LucideIcon
                      name="loader-2"
                      className="w-4 h-4 animate-spin"
                    />
                    <span>Đang chấm bài...</span>
                  </div>
                </div>
              )}

              {results && (
                <div className="mt-8 p-8 bg-white dark:bg-slate-900 rounded-[32px] border border-slate-200 dark:border-slate-800 shadow-2xl animate-in zoom-in duration-500 overflow-hidden">
                  <h3 className="text-2xl font-black mb-6 dark:text-white italic uppercase tracking-tighter">
                    Kết quả
                  </h3>

                  <div className="flex items-center gap-2 mb-8">
                    <LucideIcon
                      name="check-circle-2"
                      className="w-5 h-5 text-green-600"
                    />
                    <span className="text-lg font-black text-green-600">
                      ×{results.filter((r) => r.status === "AC").length}
                    </span>
                  </div>

                  <div className="space-y-3 font-mono text-[13px] text-slate-800 dark:text-slate-200">
                    {results.map((r) => (
                      <div
                        key={r.id}
                        className="flex flex-wrap items-center gap-x-2 leading-relaxed"
                      >
                        <span className="font-bold">Test case #{r.id}:</span>
                        <span
                          className={
                            r.status === "AC"
                              ? "text-green-600 font-black"
                              : "text-red-500 font-black"
                          }
                        >
                          {r.status === "AC"
                            ? "Chính xác (AC)"
                            : "Sai kết quả (WA)"}
                        </span>
                        <span className="text-slate-500">
                          [{r.time}s,{r.memory} MB]
                        </span>
                        <span className="text-slate-500">({r.score})</span>
                        {r.status === "WA" && r.actual && (
                          <div className="w-full mt-2 p-3 bg-slate-100 dark:bg-slate-800 rounded-lg text-[11px]">
                            <div className="flex gap-2">
                              <span className="text-slate-400">Mong đợi:</span>
                              <span className="text-emerald-600 font-bold">
                                {r.expected}
                              </span>
                            </div>
                            <div className="flex gap-2">
                              <span className="text-slate-400">Thực tế:</span>
                              <span className="text-red-500 font-bold">
                                {r.actual}
                              </span>
                            </div>
                          </div>
                        )}
                        {r.stderr && (
                          <pre className="w-full mt-2 p-3 bg-red-500/5 text-red-400 text-[10px] rounded-lg overflow-x-auto">
                            {r.stderr}
                          </pre>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const CompetitiveMatch = ({
        userStats,
        setUserStats,
        allCodingProblems,
        isDbReady,
      }) => {
        const [view, setView] = useState("lobby"); // lobby, room, playing, results
        const [matchData, setMatchData] = useState(null);
        const [roomId, setRoomId] = useState("");
        const [timeLeft, setTimeLeft] = useState(0);
        const [activeProblemIdx, setActiveProblemIdx] = useState(0);
        const [submissionStatus, setSubmissionStatus] = useState({}); // {probId: 'solved' | 'wrong' | 'idle'}
        const [winnerStatus, setWinnerStatus] = useState(null); // 'win', 'lose', 'draw'

        useEffect(() => {
          if (!matchData?.id || view !== "playing") return;

          const timer = setInterval(() => {
            const now = new Date().getTime();
            const start = matchData.startTime?.seconds
              ? matchData.startTime.seconds * 1000
              : new Date(matchData.startTime).getTime();
            const limit = matchData.timeLimitMinutes * 60 * 1000;
            const diff = Math.max(0, limit - (now - start));
            setTimeLeft(Math.floor(diff / 1000));

            if (diff <= 0) {
              clearInterval(timer);
              handleMatchEnd();
            }
          }, 1000);
          return () => clearInterval(timer);
        }, [matchData, view]);

        useEffect(() => {
          if (!matchData?.id) return;
          const fm = window.FirebaseModular;
          const unsubscribe = fm.onSnapshot(
            fm.doc(db, "matches", matchData.id),
            (doc) => {
              if (doc.exists()) {
                const data = doc.data();
                setMatchData((prev) => ({ ...prev, ...data }));
                if (data.status === "playing" && view === "room")
                  setView("playing");
                if (data.status === "finished" && view === "playing")
                  setView("results");
              }
            },
          );
          return () => unsubscribe();
        }, [matchData?.id, view]);

        const createRoom = async (type = "1v1") => {
          const fm = window.FirebaseModular;
          const id = Math.random().toString(36).substr(2, 6).toUpperCase();
          const newMatch = {
            matchId: id,
            type,
            status: "lobby",
            players: [
              {
                id:
                  userStats.userId ||
                  localStorage.getItem("informatics_local_id"),
                name: userStats.userName,
                class: userStats.userClass,
                avatar: userStats.avatar || "",
                team: 1,
                isHost: true,
              },
            ],
            problemIds: [],
            timeLimitMinutes: 10,
            defaultTimeMinutes: 10,
            scores: { team1: 0, team2: 0 },
            playerScores: {},
            createdAt: fm.serverTimestamp(),
            hostId:
              userStats.userId || localStorage.getItem("informatics_local_id"),
          };
          await fm.setDoc(fm.doc(db, "matches", id), newMatch);
          setMatchData({ id, ...newMatch });
          setView("room");
        };

        const joinRoom = async () => {
          const fm = window.FirebaseModular;
          const docRef = fm.doc(db, "matches", roomId.toUpperCase());
          const snap = await fm.getDoc(docRef);
          if (!snap.exists()) {
            alert("Không tìm thấy phòng!");
            return;
          }
          const data = snap.data();
          if (data.status !== "lobby") {
            alert("Trận đấu đã bắt đầu hoặc kết thúc!");
            return;
          }

          const players = data.players || [];
          const myId =
            userStats.userId || localStorage.getItem("informatics_local_id");
          if (players.find((p) => p.id === myId)) {
            setMatchData({ id: roomId.toUpperCase(), ...data });
            setView("room");
            return;
          }

          // Assign team
          let team = 1;
          if (data.type === "1v1") {
            if (players.length >= 2) {
              alert("Phòng đã đầy!");
              return;
            }
            team = 2;
          } else {
            if (players.length >= 4) {
              alert("Phòng đã đầy!");
              return;
            }
            const t1Count = players.filter((p) => p.team === 1).length;
            const t2Count = players.filter((p) => p.team === 2).length;
            team = t1Count > t2Count ? 2 : 1;
          }

          const newPlayers = [
            ...players,
            {
              id: myId,
              name: userStats.userName,
              class: userStats.userClass,
              avatar: userStats.avatar || "",
              team,
              isHost: false,
            },
          ];

          await fm.updateDoc(docRef, { players: newPlayers });
          setMatchData({
            id: roomId.toUpperCase(),
            ...data,
            players: newPlayers,
          });
          setView("room");
        };

        const startMatch = async () => {
          const fm = window.FirebaseModular;
          // Select problems
          const easy = allCodingProblems.filter((p) => p.difficulty === "easy");
          const medium = allCodingProblems.filter(
            (p) => p.difficulty === "medium",
          );
          const hard = allCodingProblems.filter((p) => p.difficulty === "hard");

          let selected = [];
          if (matchData.type === "1v1") {
            selected = [
              ...easy.sort(() => 0.5 - Math.random()).slice(0, 2),
              ...medium.sort(() => 0.5 - Math.random()).slice(0, 1),
              ...hard.sort(() => 0.5 - Math.random()).slice(0, 1),
            ];
          } else {
            selected = [
              ...easy.sort(() => 0.5 - Math.random()).slice(0, 4),
              ...medium.sort(() => 0.5 - Math.random()).slice(0, 2),
              ...hard.sort(() => 0.5 - Math.random()).slice(0, 2),
            ];
          }

          if (selected.length === 0) {
            alert("Hệ thống chưa có đủ bài tập để bắt đầu!");
            return;
          }

          const updates = {
            status: "playing",
            problemIds: selected.map((p) => p.id),
            startTime: fm.serverTimestamp(),
          };
          await fm.updateDoc(fm.doc(db, "matches", matchData.id), updates);
        };

        const handleMatchEnd = async () => {
          const fm = window.FirebaseModular;
          const docRef = fm.doc(db, "matches", matchData.id);
          const snap = await fm.getDoc(docRef);
          const data = snap.data();
          if (data.status === "finished") return;

          const t1 = data.scores.team1;
          const t2 = data.scores.team2;

          let winTeam = 0;
          if (t1 > t2) winTeam = 1;
          else if (t2 > t1) winTeam = 2;

          await fm.updateDoc(docRef, { status: "finished", winner: winTeam });

          // Update stars for current user
          const myId =
            userStats.userId || localStorage.getItem("informatics_local_id");
          const me = data.players.find((p) => p.id === myId);
          if (me) {
            let starDiff = 0;
            if (winTeam === 0) starDiff = 0;
            else if (me.team === winTeam) starDiff = 2;
            else starDiff = -1;

            if (starDiff !== 0) {
              const userRef = fm.doc(db, "users", myId);
              await fm.updateDoc(userRef, {
                stars: fm.increment(starDiff),
                updatedAt: fm.serverTimestamp(),
              });
              setUserStats((prev) => ({
                ...prev,
                stars: Math.max(0, (prev.stars || 0) + starDiff),
              }));
            }
            setWinnerStatus(
              winTeam === 0 ? "draw" : me.team === winTeam ? "win" : "lose",
            );
          }
        };

        const submitProblem = async (isCorrect) => {
          if (!isCorrect) return;
          const probId = matchData.problemIds[activeProblemIdx];
          if (submissionStatus[probId] === "solved") return;

          const fm = window.FirebaseModular;
          const myId =
            userStats.userId || localStorage.getItem("informatics_local_id");
          const me = matchData.players.find((p) => p.id === myId);

          // Point logic: +50 per correct answer + bonus for faster time
          const bonus =
            (matchData.defaultTimeMinutes - matchData.timeLimitMinutes) * 10;
          const totalPoints = 50 + Math.max(0, bonus);

          const teamKey = me.team === 1 ? "team1" : "team2";
          const field = `scores.${teamKey}`;
          const playerField = `playerScores.${myId}`;

          await fm.updateDoc(fm.doc(db, "matches", matchData.id), {
            [field]: fm.increment(totalPoints),
            [playerField]: fm.increment(totalPoints),
          });

          setSubmissionStatus((prev) => ({ ...prev, [probId]: "solved" }));

          // If all problems solved by me, maybe check if teammate too?
          // For simplicity, just mark as solved.
          if (activeProblemIdx < matchData.problemIds.length - 1) {
            setActiveProblemIdx((prev) => prev + 1);
          }
        };

        if (view === "lobby") {
          return (
            <div className="max-w-xl mx-auto space-y-8 p-12 bg-white dark:bg-slate-900 rounded-[40px] shadow-2xl border border-slate-100 dark:border-slate-800 text-center animate-in fade-in zoom-in duration-500">
              <div className="w-24 h-24 bg-purple-600/10 rounded-3xl mx-auto flex items-center justify-center text-purple-600 mb-6">
                <LucideIcon name="swords" className="w-12 h-12" />
              </div>
              <h2 className="text-4xl font-black italic uppercase tracking-tighter dark:text-white">
                THI ĐẤU ĐỐI KHÁNG
              </h2>
              <p className="text-slate-500 font-medium">
                Bản lĩnh lập trình viên - Đối chiến 1vs1 hoặc 2vs2 thời gian
                thực.
              </p>

              <div className="grid gap-4 mt-12">
                <div className="flex gap-4">
                  <button
                    onClick={() => createRoom("1v1")}
                    className="flex-1 bg-blue-600 text-white p-6 rounded-3xl font-black uppercase tracking-widest text-xs hover:scale-105 transition-all shadow-xl shadow-blue-500/20"
                  >
                    Tạo phòng 1v1
                  </button>
                  <button
                    onClick={() => createRoom("2v2")}
                    className="flex-1 bg-purple-600 text-white p-6 rounded-3xl font-black uppercase tracking-widest text-xs hover:scale-105 transition-all shadow-xl shadow-purple-500/20"
                  >
                    Tạo phòng 2v2
                  </button>
                </div>
                <div className="relative">
                  <div className="absolute inset-y-0 left-6 flex items-center text-slate-400">
                    <LucideIcon name="hash" className="w-5 h-5" />
                  </div>
                  <input
                    type="text"
                    className="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 p-6 pl-14 rounded-3xl font-black text-xl uppercase tracking-widest focus:border-blue-500 outline-none transition-all dark:text-white"
                    placeholder="NHẬP ID PHÒNG..."
                    value={roomId}
                    onChange={(e) => setRoomId(e.target.value)}
                  />
                </div>
                <button
                  onClick={joinRoom}
                  className="w-full bg-slate-900 dark:bg-slate-700 text-white p-6 rounded-3xl font-black uppercase tracking-widest text-xs hover:scale-[1.02] transition-all"
                >
                  Vào phòng ngay
                </button>
              </div>
            </div>
          );
        }

        if (view === "room") {
          const myId =
            userStats.userId || localStorage.getItem("informatics_local_id");
          const isHost = matchData.players.find((p) => p.id === myId)?.isHost;
          return (
            <div className="max-w-4xl mx-auto space-y-12 animate-in fade-in slide-in-from-bottom-8 duration-700">
              <header className="bg-white dark:bg-slate-900 p-12 rounded-[48px] border border-slate-100 dark:border-slate-800 shadow-2xl relative overflow-hidden">
                <div className="flex justify-between items-center mb-8 relative z-10">
                  <div>
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[4px] mb-2">
                      PHÒNG CHỜ THI ĐẤU
                    </p>
                    <h2 className="text-5xl font-black italic uppercase tracking-tighter dark:text-white">
                      ROOM #{matchData.matchId}
                    </h2>
                  </div>
                  <div className="bg-slate-50 dark:bg-slate-800 px-6 py-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                    <span className="text-xl font-black dark:text-white uppercase italic">
                      {matchData.type} MATCH
                    </span>
                  </div>
                </div>

                <div className="grid md:grid-cols-2 gap-12 relative z-10">
                  <div className="space-y-6">
                    <h3 className="text-xs font-black text-blue-600 uppercase tracking-widest flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full bg-blue-600"></div>{" "}
                      ĐỘI XANH (TEAM 1)
                    </h3>
                    <div className="grid gap-3">
                      {matchData.players
                        .filter((p) => p.team === 1)
                        .map((p) => (
                          <div
                            key={p.id}
                            className="flex items-center gap-4 bg-slate-50 dark:bg-slate-800 p-5 rounded-3xl border border-slate-100 dark:border-slate-700"
                          >
                            {p.avatar ? (
                              <img
                                src={p.avatar}
                                alt="Avatar"
                                className="w-10 h-10 rounded-xl object-cover"
                                referrerPolicy="no-referrer"
                              />
                            ) : (
                              <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                                <LucideIcon name="user" className="w-5 h-5" />
                              </div>
                            )}
                            <div className="flex-1">
                              <p className="font-black dark:text-white text-sm uppercase">
                                {p.name}
                              </p>
                              <p className="text-[10px] font-bold text-slate-400">
                                Lớp {p.class} {p.isHost && "• CHỦ PHÒNG"}
                              </p>
                            </div>
                          </div>
                        ))}
                      {matchData.players.filter((p) => p.team === 1).length <
                        (matchData.type === "1v1" ? 1 : 2) && (
                        <div className="p-8 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-3xl text-center opacity-30">
                          <LucideIcon
                            name="user-plus"
                            className="w-6 h-6 mx-auto mb-2 text-slate-400"
                          />
                          <p className="text-[8px] font-black uppercase tracking-widest">
                            Đang chờ...
                          </p>
                        </div>
                      )}
                    </div>

          lines.forEach(line => {
             let separator = ':';
             if (!line.includes(':') && line.includes('-')) separator = '-';
             if (line.includes(separator)) {
                 const [f, ...bArr] = line.split(separator);
                 const b = bArr.join(separator).trim();
                 if (f.trim() && b) {
                     newCards.push({ f: f.trim(), b });
                 }
             }
          });

          const blocks = bulkText.split(/(?=(?:Câu|Bài)\s*\d+[\.\:]|(?:\n|^)\d+[\.\:])/i).filter(b => b.trim());
          let newQuestions = [];

          blocks.forEach(block => {
            let content = block.replace(/^(?:(?:\n|^)\s*)?(?:Câu|Bài)?\s*\d+[\.\:]?\s*/i, '').replace(/^\d+[\.\:]\s*/, '').trim();
            
            const optionStartMatch = content.match(/(?:^|\n)\s*[A-D][\.\)]\s/i);

            let optionsText = "";
            let options = [];
            let correct = 0;

            if (optionStartMatch) {

                qText = content.substring(0, optionStartIndex).trim();
                const adjustedIndex = content[optionStartIndex] === '\n' ? optionStartIndex + 1 : optionStartIndex;

                let match;
                while ((match = optRegex.exec(optionsText)) !== null) {
                    let opt = match[1];
                    let isCorrect = opt.includes('*');
                    opt = opt.replace(/^[A-D][\.\)]\s*/i, '').replace(/\*/g, '').trim();

            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const MAX_WIDTH = 200;
              const MAX_HEIGHT = 200;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) {
                  height *= MAX_WIDTH / width;
                  width = MAX_WIDTH;
                }
              } else {
                if (height > MAX_HEIGHT) {
                  width *= MAX_HEIGHT / height;
                  height = MAX_HEIGHT;

              }
              canvas.width = width;

                            <LucideIcon
                              name="arrow-right"
                              className="w-6 h-6"
                            />
                          )}
                        </button>
                      </>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      try {
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(
          <ErrorBoundary>
            <App />
          </ErrorBoundary>,
        );
      } catch (renderError) {
        console.error("Mount Error:", renderError);
        document.body.innerHTML = `<div style="padding: 40px; color: red; font-family: sans-serif; text-align: center;"><h1>Lỗi khởi động</h1><p>${renderError.message}</p></div>`;
      }
    </script>
  </body>
</html>
