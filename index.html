        // --- COMPONENTS ---

        // Ultra-Safe LucideIcon for React compat mode
        const LucideIcon = React.memo(({ name, className = "" }) => {
            const iconRef = React.useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // Create a dedicated shell that React doesn't touch
                    // We render INTO this shell to avoid removeChild errors
                    const shell = iconRef.current;
                    shell.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    try {
                        window.lucide.createIcons({ root: shell });
                    } catch (e) {
                        console.warn("Lucide shell error:", e);
                    }
                }
            }, [name, className]);

            // We use dangerouslySetInnerHTML to tell React "don't manage children"
            return <span 
                ref={iconRef} 
                className="inline-flex items-center justify-center shrink-0"
                dangerouslySetInnerHTML={{ __html: '' }}
            ></span>;
        });

        // Error Boundary Component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("React Crash:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-10 text-center">
                            <div className="max-w-md">
                                <i className="w-20 h-20 text-red-500 mx-auto mb-8 block">⚠️</i>
                                <h2 className="text-3xl font-black mb-4 uppercase italic">Ứng dụng bị treo</h2>
                                <p className="text-slate-400 mb-8">Đã xảy ra lỗi trong khi hiển thị giao diện.</p>
                                <div className="bg-red-900/20 border border-red-500/20 p-4 rounded-xl mb-8 text-left">
                                    <code className="text-red-400 text-xs break-all">{this.state.error?.toString()}</code>
                                </div>
                                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase">Xóa dữ liệu & Tải lại</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const Quiz = ({ lesson, onComplete }) => {
            const [questions, setQuestions] = useState([]);
            const [current, setCurrent] = useState(0);
            const [selected, setSelected] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [score, setScore] = useState(0);
            const [finished, setFinished] = useState(false);

            useEffect(() => {
                if (!lesson || !lesson.questionPool) return;
                
                // Fisher-Yates Shuffle
                const shuffle = (array) => {
                    const arr = [...array];
                    for (let i = arr.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [arr[i], arr[j]] = [arr[j], arr[i]];
                    }
                    return arr;
                };

                const pool = shuffle(lesson.questionPool);
                const limit = Math.min(pool.length, 20);
                const selectedQuestions = pool.slice(0, limit).map(q => {
                    // Also randomize options for each question
                    const originalOptions = q.options.map((text, index) => ({ text, isCorrect: index === q.correct }));
                    const shuffledOpts = shuffle(originalOptions);
                    return {
                        ...q,
                        options: shuffledOpts.map(o => o.text),
                        correct: shuffledOpts.findIndex(o => o.isCorrect)
                    };
                });

                setQuestions(selectedQuestions);
                setCurrent(0); setSelected(null); setShowResult(false); setScore(0); setFinished(false);
            }, [lesson?.id]);

            const handleAnswer = (idx) => {
                if (showResult) return;
                setSelected(idx);
                setShowResult(true);
                if (idx === questions[current].correct) setScore(s => s + 1);
            };

            const next = () => {
                if (current < questions.length - 1) {
                    setCurrent(c => c + 1);
                    setSelected(null);
                    setShowResult(false);
                } else {
                    setFinished(true);
                    onComplete(score);
                }
            };

            if (!questions.length) return <div className="p-8 text-center text-slate-400">Đang tải câu hỏi...</div>;

            if (finished) {
                const isPassed = (score / questions.length) >= 0.8;
                const totalQ = questions.length;
                return (
                    <div className="p-8 text-center bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-700">
                        <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 ${isPassed ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                            <LucideIcon name={isPassed ? "check-circle" : "alert-circle"} className="w-10 h-10" />
                        </div>
                        <h4 className="text-3xl font-black mb-2 font-display dark:text-white">Kết quả bài làm</h4>
                        <p className="text-lg text-slate-500 mb-6">Bạn đúng <span className={`font-bold ${isPassed ? 'text-green-600' : 'text-red-600'}`}>{score}/{totalQ}</span> câu.</p>
                        <button onClick={() => {
                             // Same shuffle logic for "Try again"
                             const shuffle = (array) => {
                                const arr = [...array];
                                for (let i = arr.length - 1; i > 0; i--) {
                                    const j = Math.floor(Math.random() * (i + 1));
                                    [arr[i], arr[j]] = [arr[j], arr[i]];
                                }
                                return arr;
                             };
                             const pool = shuffle(lesson.questionPool);
                             const limit = Math.min(pool.length, 20);
                             const selectedQuestions = pool.slice(0, limit).map(q => {
                                const originalOptions = q.options.map((text, index) => ({ text, isCorrect: index === q.correct }));
                                const shuffledOpts = shuffle(originalOptions);
                                return {
                                    ...q,
                                    options: shuffledOpts.map(o => o.text),
                                    correct: shuffledOpts.findIndex(o => o.isCorrect)
                                };
                             });
                             setQuestions(selectedQuestions);
                             setCurrent(0); setScore(0); setSelected(null); setShowResult(false); setFinished(false);
                        }} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">Làm lại ngay</button>
                    </div>
                );
            }

            const q = questions[current];
            const totalQ = questions.length;
            return (
                <div className="bg-white dark:bg-slate-800 p-6 md:p-10 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">KIỂM TRA TIẾN ĐỘ</span>
                            <span className="text-sm font-bold text-blue-600">Câu {current + 1} / {totalQ}</span>
                        </div>
                        <div className="h-2 w-32 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                            <div className="h-full bg-blue-500 transition-all duration-300" style={{width: `${((current+1)/totalQ)*100}%`}}></div>
                        </div>
                    </div>
                    <h4 className="text-xl font-bold mb-8 leading-tight dark:text-slate-100">{q.question}</h4>
                    <div className="space-y-3">
                        {q.options.map((opt, i) => (
                            <button
                                key={i} onClick={() => handleAnswer(i)} disabled={showResult}
                                className={`w-full p-4 text-left rounded-2xl border-2 transition-all flex items-center gap-4 font-bold active:scale-[0.99]
                                    ${showResult && i === q.correct ? 'border-green-500 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400' : 
                                      showResult && i === selected ? 'border-red-500 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400' : 
                                      selected === i ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-slate-100 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-blue-200'}
                                `}
                            >
                                <span className={`w-8 h-8 flex items-center justify-center rounded-lg text-xs font-black
                                    ${showResult && i === q.correct ? 'bg-green-500 text-white' : 'bg-slate-100 dark:bg-slate-700 text-slate-500'}
                                `}>{String.fromCharCode(65+i)}</span>
                                {opt}
                            </button>
                        ))}
                    </div>
                    {showResult && (
                        <div className="mt-8 animate-in slide-in-from-top-2 duration-300">
                            <div className="p-4 bg-slate-50 dark:bg-slate-900/50 rounded-xl mb-6 border border-slate-100 dark:border-slate-700">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">GIẢI THÍCH</p>
                                <p className="text-sm text-slate-600 dark:text-slate-300 italic">{q.expl}</p>
                            </div>
                            <button onClick={next} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-blue-700 shadow-lg active:scale-95 transition-all">
                                {current === questions.length - 1 ? 'XEM KẾT QUẢ' : 'CÂU TIẾP THEO'}
                                <LucideIcon name="arrow-right" className="w-5 h-5" />
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const Flashcard = ({ card }) => {

        // --- MAIN APP ---

        const App = () => {

            // Hooks must be at the top level
            const [dark, setDark] = useState(() => localStorage.getItem('theme') === 'dark');

            // Initialize Firebase once
            useEffect(() => {

            const [userStats, setUserStats] = useState(() => {
                const saved = localStorage.getItem('informatics_ranks_final');
                const defaultStats = {

                    completedLessons: [], 
                    userName: '', 
                    userClass: '',
                    schoolId: '',
                    schoolName: ''
                };
                if (!saved) return defaultStats;
                try {
                    const parsed = JSON.parse(saved);
                    if (typeof parsed !== 'object' || parsed === null) return defaultStats;
                    return { ...defaultStats, ...parsed };
                } catch (e) {
                    return defaultStats;
                }
            });

            // Identity Setup Modal States
            const [showSetup, setShowSetup] = useState(!userStats.userName || !userStats.userClass || !userStats.schoolId);
            const [tempName, setTempName] = useState(userStats.userName || '');
            const [tempClass, setTempClass] = useState(userStats.userClass || '');
            const [tempSchoolId, setTempSchoolId] = useState(userStats.schoolId || '');
            const [leaderboardTab, setLeaderboardTab] = useState('class'); // 'class', 'school', 'province'

            // Sync with Firebase Auth - Best Effort
            useEffect(() => {
                if (!auth) return;
                try {
                    const fm = window.FirebaseModular;
                    const unsubscribe = fm.onAuthStateChanged(auth, u => {
                        if (u) {
                            setUser(u);
                        } else {
                            fm.signInAnonymously(auth).catch(e => {
                                console.log("Firebase: Anonymous login restricted");
                            });
                        }
                    });
                    return () => unsubscribe();
                } catch (e) {
                    console.error("Auth init fatal error:", e);
                }
            }, [isDbReady]);

            // Leaderboard Real-time updates
            useEffect(() => {
                if (!db || !isDbReady) return;
                
                try {
                    const fm = window.FirebaseModular;
                    let q;
                    const usersRef = fm.collection(db, 'users');

                    if (leaderboardTab === 'class') {
                        if (!userStats.schoolId || !userStats.userClass) return;
                        q = fm.query(
                            usersRef, 
                            fm.where('schoolId', '==', userStats.schoolId),
                            fm.where('userClass', '==', userStats.userClass.trim().toUpperCase())
                        );
                    } else if (leaderboardTab === 'school') {
                        if (!userStats.schoolId) return;
                        q = fm.query(
                            usersRef, 
                            fm.where('schoolId', '==', userStats.schoolId)
                        );
                    } else {
                        // Province scope
                        q = fm.query(usersRef);
                    }

                    const unsubscribe = fm.onSnapshot(q, snap => {
                        if (snap.empty) {
                            setLeaderboard([]);
                            return;
                        }
                        
                        const data = snap.docs.map(doc => {
                            const d = doc.data();
                            return { 
                                userId: d.userId || doc.id,
                                userName: d.userName || 'Ẩn danh',
                                userClass: (d.userClass || '').toUpperCase(),
                                schoolName: d.schoolName || '',
                                stars: parseInt(d.stars) || 0,
                                completedLessons: d.completedLessons || [],
                                updatedAt: d.updatedAt
                            };
                        });
                        const sorted = data.sort((a, b) => {
                            const diff = b.stars - a.stars;
                            if (diff !== 0) return diff;
                            
                            const getSecs = (ts) => {
                                if (!ts) return 0;
                                if (ts.seconds) return ts.seconds;
                                if (ts.toDate) return ts.toDate().getTime() / 1000;
                                if (ts instanceof Date) return ts.getTime() / 1000;
                                return 0;
                            };
                            return getSecs(b.updatedAt) - getSecs(a.updatedAt);
                        });
                        setLeaderboard(sorted.slice(0, 50));
                    }, err => {
                        console.error("Leaderboard error:", err);
                    });
                    return () => unsubscribe();
                } catch (e) {
                    console.error("Leaderboard crash:", e);
                }
            }, [userStats.userClass, userStats.schoolId, leaderboardTab, isDbReady, db]);

            // Sync Identity to Firestore
            const saveIdentity = async () => {

                const finalClass = (tempClass || "").trim().toUpperCase();
                const school = SCHOOL_LIST.find(s => s.id === tempSchoolId);

                                </div>
                                <div className="w-10 h-10 rounded-xl bg-slate-50 dark:bg-slate-700 flex items-center justify-center border border-white dark:border-slate-600">
                                    <LucideIcon name={rank.icon} className={`w-5 h-5 ${rank.color}`} />
                                </div>
                            </div>

                            <button onClick={() => setDark(!dark)} className="p-2.5 bg-white dark:bg-slate-800 shadow-md border border-slate-100 dark:border-slate-700 rounded-xl text-slate-600">
                                <LucideIcon name={dark ? 'sun' : 'moon'} className={`w-5 h-5 ${dark ? 'text-yellow-400' : 'text-slate-400'}`} />
                            </button>
                        </div>
                    </nav>

                    <div className="flex-1 flex overflow-hidden">
                        {/* Mobile Sidebar */}
                        {mobileMenu && (
                            <div className="fixed inset-0 z-[70] md:hidden">
                                <div onClick={() => setMobileMenu(false)} className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300" />
                                <aside className="absolute left-0 top-0 bottom-0 w-80 bg-white dark:bg-slate-900 p-6 shadow-2xl flex flex-col animate-in slide-in-from-left duration-300">
                                    <div className="flex justify-between items-center mb-8">
                                        <span className="font-black uppercase tracking-widest text-slate-400 text-xs text-center flex-1">Danh mục bài học</span>
                                        <button onClick={() => setMobileMenu(false)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl">
                                            <LucideIcon name="x" className="w-6 h-6" />
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto">
                                        {CHAPTERS_DATA.map(ch => (
                                    <SidebarChapter key={ch.id} chapter={ch} activeId={activeLessonId} setActiveId={(id) => { setActiveLessonId(id); setMobileMenu(false); }} completedLessons={userStats.completedLessons || []} />
                                        ))}
                                    </div>
                                </aside>
                            </div>
                        )}

                        {/* Desktop Sidebar */}
                        <aside className="hidden md:flex w-80 shrink-0 flex-col border-r border-slate-100 dark:border-slate-800 bg-white/40 dark:bg-slate-950/20 p-6 overflow-y-auto">
                            <div className={`mb-8 p-8 bg-gradient-to-b ${rank.bgColor} rounded-[32px] border border-white/10 shadow-2xl relative overflow-hidden flex flex-col items-center group`}>
                                <div className="absolute inset-0 bg-slate-900/40 -z-10"></div>
                                
                                {/* Stars Container (Top) */}
                                <div className="flex gap-4 mb-8">
                                    {[0, 1, 2].map(s => (
                                        <div 
                                            key={s} 
                                            className={`transition-all duration-500 delay-[${s*100}ms] ${s < starsInRank ? 'scale-110' : 'scale-100'}`}
                                        >
                                            <LucideIcon 
                                                name="star" 
                                                className={`w-7 h-7 filter drop-shadow-[0_0_8px_rgba(250,204,21,0.5)] ${s < starsInRank ? 'star-active' : 'star-inactive opacity-20'}`} 
                                            />
                                        </div>
                                    ))}
                                </div>

                                {/* Main Rank Icon (Middle) - Centered and Larger */}
                                <div className="relative mb-6">
                                    <div className={`absolute inset-0 ${rank.color} opacity-20 blur-3xl rounded-full scale-150 transform -z-10 animate-pulse`}></div>
                                    <div 
                                        key={rank.name}
                                        className={`w-40 h-40 rounded-full flex items-center justify-center border-b-8 border-t border-x border-white/20 bg-gradient-to-t from-black/40 to-white/5 shadow-[0_20px_50px_rgba(0,0,0,0.5)] transform group-hover:scale-110 transition-transform duration-500 animate-in zoom-in duration-500`}
                                    >
                                        <LucideIcon name={rank.icon} className={`w-24 h-24 ${rank.color} filter drop-shadow-[0_0_20px_currentColor]`} />
                                    </div>
                                </div>

                                {/* Rank Label (Bottom) */}
                                <div className="text-center space-y-1">
                                    <h4 className={`text-3xl font-black italic tracking-tight ${rank.color} uppercase`}>
                                        {rank.name} {rank.subTier}
                                    </h4>
                                    <p className="text-[10px] font-bold text-white/40 uppercase tracking-[4px]">CẤP BẬC HIỆN TẠI</p>
                                </div>
                            </div>
                            {CHAPTERS_DATA.map(ch => (
                                <SidebarChapter key={ch.id} chapter={ch} activeId={activeLessonId} setActiveId={setActiveLessonId} completedLessons={userStats.completedLessons || []} />
                            ))}
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 overflow-y-auto bg-slate-50/20 p-6 md:p-12 lg:p-20">
                            <div className="max-w-4xl mx-auto space-y-12">
                                
                                <div className="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest bg-white dark:bg-slate-900 px-4 py-2 rounded-full w-fit border border-slate-100 dark:border-slate-800">
                                    <span>NỘI DUNG</span>
                                    <LucideIcon name="chevron-right" className="w-3 h-3" />
                                    <span className="text-blue-500">{activeLesson.title}</span>
                                </div>

                                <header className="space-y-6">
                                    <h2 className="text-5xl md:text-7xl font-display font-black tracking-tight leading-tight dark:text-white uppercase">
                                        {activeLesson.title}
                                    </h2>
                                    <p className="text-xl text-slate-500 dark:text-slate-400 font-medium">
                                        Ôn tập các kiến thức trọng tâm và thực hành trắc nghiệm để thăng hạng sao cấp bậc của bạn.
                                    </p>
                                </header>

                                {/* Tabs */}
                                <div className="flex p-2 bg-white/80 dark:bg-slate-900/80 rounded-3xl sticky top-4 z-40 backdrop-blur-xl shadow-2xl shadow-slate-200/50 border border-slate-100 dark:border-slate-800">
                                    {[
                                        { id: 'study', label: 'TỔNG QUAN', icon: 'book-open' },
                                        { id: 'quiz', label: 'LUYỆN RANK', icon: 'sword' },
                                        { id: 'flash', label: 'GHI NHỚ', icon: 'zap' },
                                        { id: 'leaderboard', label: 'BXH', icon: 'bar-chart' }
                                    ].map(t => (
                                        <button 
                                            key={t.id} onClick={() => setTab(t.id)}
                                            className={`flex-1 flex items-center justify-center gap-2 py-4 rounded-2xl text-[11px] font-black uppercase tracking-wider transition-all
                                                ${tab === t.id ? 'bg-blue-600 text-white shadow-xl shadow-blue-500/30' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200'}
                                            `}
                                        >
                                            <LucideIcon name={t.icon} className="w-4 h-4" />
                                            {t.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="min-h-[500px]">
                                    {tab === 'study' && (
                                        <div className="bg-white dark:bg-slate-900 p-8 md:p-14 rounded-[40px] shadow-2xl border border-slate-100 dark:border-slate-800 relative overflow-hidden group animate-in fade-in slide-in-from-bottom-4 duration-500">
                                            <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500/5 rounded-full -mr-32 -mt-32 blur-3xl"></div>
                                            <h3 className="text-3xl font-black mb-10 flex items-center gap-5 font-display dark:text-white tracking-tighter uppercase italic">
                                                <div className="w-12 h-12 bg-blue-50 dark:bg-blue-900/30 text-blue-500 rounded-2xl flex items-center justify-center">
                                                    <LucideIcon name="bookmark" className="w-6 h-6" />
                                                </div>
                                                Kiến thức trọng tâm
                                            </h3>
                                            <div className="grid gap-8">
                                                {activeLesson.summary.map((point, i) => (
                                                    <div key={i} className="flex gap-6 items-start group/item">
                                                        <span className="w-9 h-9 bg-slate-50 dark:bg-slate-800 rounded-xl flex items-center justify-center text-[10px] font-black text-slate-400 group-hover/item:bg-blue-600 group-hover/item:text-white transition-all shrink-0 border border-slate-100 dark:border-slate-800">
                                                            {(i + 1).toString().padStart(2, '0')}
                                                        </span>
                                                        <p className="text-xl text-slate-700 dark:text-slate-300 leading-relaxed pt-1 font-semibold italic">{point}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {tab === 'quiz' && <Quiz lesson={activeLesson} onComplete={handleQuizComplete} />}
                                    
                                    {tab === 'flash' && (
                                        <div className="grid md:grid-cols-2 gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                            {activeLesson.flashcards.map((card, i) => (
                                                <Flashcard key={i} card={card} />
                                            ))}
                                        </div>
                                    )}

                                    {tab === 'leaderboard' && (
                                        <div className="bg-white dark:bg-slate-900 rounded-[40px] shadow-2xl border border-slate-100 dark:border-slate-800 overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                                            <div className="p-8 md:p-12 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
                                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
                                                    <div>
                                                        <h3 className="text-3xl font-black italic tracking-tighter uppercase mb-2 dark:text-white">Bảng xếp hạng</h3>
                                                        <p className="text-sm text-slate-500 font-bold uppercase tracking-widest">
                                                            {leaderboardTab === 'class' ? `Lớp ${userStats.userClass} - ${userStats.schoolName}` : 
                                                             leaderboardTab === 'school' ? userStats.schoolName : 
                                                             'Toàn tỉnh Nghệ An'}
                                                        </p>
                                                    </div>
                                                    <div className="flex p-1.5 bg-slate-200 dark:bg-slate-950 rounded-2xl">
                                                        {[
                                                            { id: 'class', label: 'LỚP' },
                                                            { id: 'school', label: 'TRƯỜNG' },
                                                            { id: 'province', label: 'TỈNH' }
                                                        ].map(lt => (
                                                            <button 
                                                                key={lt.id} 
                                                                onClick={() => setLeaderboardTab(lt.id)}
                                                                className={`px-6 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all
                                                                    ${leaderboardTab === lt.id ? 'bg-white dark:bg-slate-800 text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-500'}
                                                                `}
                                                            >
                                                                {lt.label}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-4 md:p-8">
                                                <div className="space-y-4">
                                                    {!isDbReady ? (
                                                        <div className="text-center py-20 opacity-30 animate-pulse">
                                                            <div className="w-12 h-12 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
                                                            <p className="font-black uppercase tracking-widest">Đang kết nối Cloud...</p>
                                                        </div>
                                                    ) : (leaderboard || []).length > 0 ? (leaderboard || []).map((p, i) => {
                                                        if (!p) return null;
                                                        const pStars = parseInt(p.stars) || 0;
                                                        const pRank = getRankInfo(pStars);
                                                        const isMe = p.userId && (p.userId === user?.uid || p.userId === localStorage.getItem('informatics_local_id'));
                                                        return (
                                                            <div key={i} className={`flex items-center gap-4 p-5 rounded-3xl border-2 transition-all group/lb ${isMe ? 'border-blue-500 bg-blue-50/50 dark:bg-blue-900/20' : 'border-slate-50 dark:border-slate-800'}`}>
                                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl italic shrink-0 ${i === 0 ? 'bg-yellow-100 text-yellow-600' : i === 1 ? 'bg-slate-100 text-slate-600' : i === 2 ? 'bg-orange-100 text-orange-600' : 'bg-slate-50 text-slate-400'}`}>
                                                                    {i + 1}
                                                                </div>
                                                                
                                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700`}>
                                                                    <LucideIcon name={pRank.icon} className={`w-6 h-6 ${pRank.color}`} />
                                                                </div>
 
                                                                <div className="flex-1 min-w-0">
                                                                    <div className="flex items-center gap-2">
                                                                        <h5 className="font-black text-xl dark:text-white leading-tight truncate">{p.userName || 'Ẩn danh'}</h5>
                                                                        {isMe && <span className="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full uppercase italic shrink-0">Bạn</span>}
                                                                    </div>
                                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 flex flex-wrap items-center gap-2">
                                                                        <span className="bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded text-blue-600">Lớp {p.userClass || 'N/A'}</span>
                                                                        {leaderboardTab === 'province' && <span className="bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded truncate max-w-[150px]">{p.schoolName}</span>}
                                                                        <span className={`font-black ${pRank.color}`}>{pRank.name} {pRank.subTier}</span>
                                                                    </p>
                                                                </div>
 
                                                                <div className="flex flex-col items-center shrink-0">
                                                                    <div className="flex items-center gap-2 bg-white dark:bg-slate-800 px-4 py-2 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
                                                                        <span className="text-xl font-black italic text-blue-600">{pStars % 3}</span>
                                                                        <LucideIcon name="star" className="w-5 h-5 star-active" />
                                                                    </div>
                                                                    <span className="text-[8px] font-black text-slate-300 mt-1 uppercase tracking-tighter">Tổng: {pStars}★</span>
                                                                </div>
                                                            </div>
                                                        );
                                                    }) : (
                                                        <div className="text-center py-20 opacity-30 select-none">
                                                            <LucideIcon name="users" className="w-12 h-12 mx-auto mb-4" />
                                                            <p className="font-black uppercase tracking-widest">Chưa có dữ liệu xếp hạng</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <footer className="pt-20 pb-12 border-t border-slate-200 dark:border-slate-800 flex flex-col items-center gap-6 opacity-30 text-center">
                                    <div className="flex gap-12 font-black text-[10px] uppercase tracking-[3px]">
                                        <div className="flex items-center gap-2"><LucideIcon name="shield-check" className="w-5 h-5" /> CHƯƠNG TRÌNH KNTT</div>
                                        <div className="flex items-center gap-2"><LucideIcon name="zap" className="w-5 h-5" /> HỌC TẬP SIÊU TỐC</div>
                                    </div>
                                    <p className="text-xs font-bold tracking-widest text-slate-500 dark:text-slate-400">© 2026 HỆ THỐNG LEO RANK TIN HỌC 10. PHÁT TRIỂN BỞI ĐỨC TRUNG VÀ VIỆT HOÀNG.</p>
                                </footer>
                            </div>
                        </main>
                    </div>

                    {/* Setup Overlay */}
                    {showSetup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-xl animate-in fade-in duration-500" />
                            <div className="relative bg-white dark:bg-slate-900 w-full max-w-lg rounded-[48px] p-8 md:p-12 shadow-2xl overflow-y-auto max-h-[90vh] border border-white/10 animate-in zoom-in slide-in-from-bottom-8 duration-700">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-blue-600/10 rounded-full -mr-32 -mt-32 blur-3xl"></div>
                                <div className="relative space-y-8">
                                    <div className="text-center space-y-3">
                                        <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white rotate-6 shadow-2xl scale-110 mb-6 transition-transform hover:scale-125 duration-500">
                                            <LucideIcon name="user-plus" className="w-10 h-10" />
                                        </div>
                                        <h3 className="text-4xl font-display font-black tracking-tighter uppercase italic dark:text-white">Thiết lập tài khoản</h3>
                                        <p className="text-slate-500 font-medium">Vui lòng nhập thông tin để tham gia bảng xếp hạng thi đua.</p>
                                    </div>

                                    <div className="space-y-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-[3px] ml-4">Họ và tên của bạn</label>
                                            <input 
                                                type="text" 
                                                value={tempName} 
                                                onChange={e => setTempName(e.target.value)}
                                                placeholder="Ví dụ: Nguyễn Văn A"
                                                className="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 px-6 py-5 rounded-[24px] font-black text-xl dark:text-white focus:border-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600"
                                            />
                                        </div>

                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-[3px] ml-4">Chọn trường học</label>
                                            <select 
                                                value={tempSchoolId} 
                                                onChange={e => setTempSchoolId(e.target.value)}
                                                className="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 px-6 py-5 rounded-[24px] font-black text-lg dark:text-white focus:border-blue-500 outline-none transition-all appearance-none cursor-pointer"
                                            >
                                                <option value="" disabled>-- Chọn trường --</option>
                                                {/* Group schools by region */}
                                                {Array.from(new Set(SCHOOL_LIST.map(s => s.region))).map(region => (
                                                    <optgroup key={region} label={region} className="font-bold text-blue-600 uppercase tracking-widest text-[10px] bg-white dark:bg-slate-900">
                                                        {SCHOOL_LIST.filter(s => s.region === region).map(school => (
                                                            <option key={school.id} value={school.id} className="text-black dark:text-white italic">{school.name}</option>
                                                        ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                        </div>

                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-[3px] ml-4">Chọn lớp học</label>
                                            <select 
                                                value={tempClass} 
                                                onChange={e => setTempClass(e.target.value)}
                                                className="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 px-6 py-5 rounded-[24px] font-black text-xl dark:text-white focus:border-blue-500 outline-none transition-all appearance-none cursor-pointer"
                                            >
                                                <option value="" disabled>-- Chọn lớp --</option>
                                                {Array.from({ length: 20 }, (_, i) => `10A${i + 1}`).map(cls => (
                                                    <option key={cls} value={cls} className="dark:bg-slate-900">{cls}</option>
                                                ))}
                                            </select>
                                            <div className="text-[9px] font-bold text-slate-400 ml-4 italic mt-1">* Chọn đúng lớp để thi đua cùng các bạn</div>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={saveIdentity}
                                        disabled={!tempName.trim() || !tempClass.trim() || !tempSchoolId || isSaving}
                                        className="w-full bg-blue-600 disabled:bg-slate-200 dark:disabled:bg-slate-800 text-white py-6 rounded-[32px] font-black text-xl uppercase tracking-widest shadow-2xl shadow-blue-500/40 active:scale-95 transition-all flex items-center justify-center gap-3"
                                    >
                                        {isSaving ? 'Đang chuẩn bị...' : 'Bắt đầu ngay'}
                                        {!isSaving && <LucideIcon name="arrow-right" className="w-6 h-6" />}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        } catch (renderError) {
            console.error("Mount Error:", renderError);
            document.body.innerHTML = `<div style="padding: 40px; color: red; font-family: sans-serif; text-align: center;"><h1>Lỗi khởi động</h1><p>${renderError.message}</p></div>`;
        }

    </script>
</body>
</html>
